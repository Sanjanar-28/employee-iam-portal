name: Deploy Employee IAM Portal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/employee-iam-portal

            git pull origin main

            cd backend

            sudo docker stop employee-backend || true
            sudo docker rm employee-backend || true

            sudo docker build -t employee-iam-backend .

            sudo docker run -d \
              -p 5000:5000 \
              --env-file .env \
              --name employee-backend \
              employee-iam-backend